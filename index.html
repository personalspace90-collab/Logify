<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logify Hub — Digital Products Store</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0f1a;--bg2:#0f1623;--card:#111827;--card2:#1a2235;
  --bord:rgba(255,255,255,.07);--bord2:rgba(255,255,255,.12);
  --primary:#3b82f6;--primary2:#60a5fa;
  --green:#22c55e;--red:#ef4444;--gold:#f59e0b;--gold2:#fcd34d;
  --txt:#e2e8f0;--mut:#64748b;--mut2:#94a3b8;
  --grad:linear-gradient(135deg,#3b82f6,#8b5cf6);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;}
.page{display:none;min-height:100vh;}.page.active{display:block;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:60px;padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,15,26,.95);border-bottom:1px solid var(--bord);backdrop-filter:blur(12px);}
.logo{display:flex;align-items:center;gap:.4rem;cursor:pointer;
  font-family:'Montserrat';font-size:1.15rem;font-weight:800;color:var(--txt);}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--grad);}
.nav-links{display:flex;gap:1.2rem;align-items:center;}
.nav-links a{color:var(--mut2);font-size:.83rem;font-weight:500;cursor:pointer;text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--txt);}

/* BUTTONS */
.btn{padding:.48rem 1.1rem;border-radius:7px;font-family:'Montserrat';font-weight:700;
  font-size:.8rem;cursor:pointer;transition:all .18s;border:none;letter-spacing:.15px;}
.btn-primary{background:var(--grad);color:#fff;}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{opacity:.88;}
.btn-ghost{background:rgba(255,255,255,.06);border:1px solid var(--bord2);color:var(--txt);}
.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-outline{background:transparent;border:1.5px solid var(--mut);color:var(--txt);}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);}
.btn-red{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.22);}
.btn-red:hover{background:rgba(239,68,68,.2);}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;}
.btn-lg{padding:.72rem 1.8rem;font-size:.9rem;}
.btn-sm{padding:.3rem .75rem;font-size:.73rem;}
.btn-full{width:100%;padding:.78rem;font-size:.88rem;}
.btn-xs{padding:.18rem .5rem;font-size:.67rem;}

/* HERO */
.hero{min-height:100vh;padding-top:60px;position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.hero-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.12) 0%,transparent 60%),
  radial-gradient(ellipse at 80% 80%,rgba(139,92,246,.08) 0%,transparent 50%),var(--bg);}
.hero-inner{position:relative;z-index:2;padding:3rem 1.5rem;}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);
  color:var(--primary2);padding:.26rem .85rem;border-radius:50px;
  font-size:.68rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:1.2rem;}
h1.hero-h1{font-family:'Montserrat';font-size:clamp(2rem,5vw,3.8rem);font-weight:900;
  line-height:1.1;letter-spacing:-1.5px;margin-bottom:.9rem;}
h1.hero-h1 span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-sub{color:var(--mut2);font-size:.95rem;max-width:500px;margin:0 auto 2rem;line-height:1.75;}
.hero-cta{display:flex;gap:.85rem;justify-content:center;flex-wrap:wrap;margin-bottom:3rem;}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;max-width:560px;width:100%;margin:0 auto;}
.hst{background:rgba(255,255,255,.04);border:1px solid var(--bord);border-radius:12px;padding:1.1rem .8rem;text-align:center;}
.hst-v{font-family:'Montserrat';font-size:1.5rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hst-l{color:var(--mut2);font-size:.68rem;margin-top:.18rem;}

/* SECTIONS */
.sec{padding:4rem 1.5rem;max-width:1100px;margin:0 auto;}
.sec-badge{display:inline-flex;align-items:center;background:rgba(59,130,246,.08);
  border:1px solid rgba(59,130,246,.18);color:var(--primary2);padding:.2rem .72rem;
  border-radius:50px;font-size:.64rem;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:.7rem;}
.sec-h2{font-family:'Montserrat';font-size:clamp(1.3rem,2.8vw,2rem);font-weight:800;margin-bottom:.4rem;}
.sec-sub{color:var(--mut2);font-size:.86rem;margin-bottom:2rem;}

/* STORE */
.store-wrap{max-width:1100px;margin:0 auto;padding:1.5rem;}
.cat-section{margin-bottom:2rem;}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding:0 .25rem;}
.cat-title{display:flex;align-items:center;gap:.6rem;font-family:'Montserrat';font-size:1rem;font-weight:800;}
.cat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.prod-list{background:var(--card);border:1px solid var(--bord);border-radius:14px;overflow:hidden;}
.prod-row{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;
  border-bottom:1px solid var(--bord);cursor:pointer;transition:background .18s;}
.prod-row:last-child{border-bottom:none;}
.prod-row:hover{background:rgba(255,255,255,.03);}
.prod-row-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;}
.prod-row-info{flex:1;min-width:0;}
.prod-row-name{font-size:.84rem;font-weight:600;line-height:1.35;margin-bottom:.18rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-row-stock{display:flex;align-items:center;gap:.3rem;font-size:.7rem;color:var(--mut2);}
.stock-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dot-green{background:var(--green);}
.dot-red{background:var(--red);}
.prod-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;flex-shrink:0;}
.prod-row-price{font-family:'Montserrat';font-size:.9rem;font-weight:800;color:var(--primary2);}
.buy-btn{background:var(--primary);color:#fff;border:none;padding:.3rem .82rem;
  border-radius:50px;font-family:'Montserrat';font-weight:700;font-size:.71rem;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:.22rem;}
.buy-btn:hover{background:var(--primary2);transform:translateY(-1px);}

/* STORE TOPBAR */
.store-topbar{background:var(--bg2);border-bottom:1px solid var(--bord);padding:1.2rem 1.5rem .9rem;}
.cat-filter-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem;}
.cat-tab{padding:.32rem .82rem;border-radius:50px;font-size:.74rem;font-weight:600;
  cursor:pointer;border:1px solid var(--bord2);color:var(--mut2);
  transition:all .18s;background:rgba(255,255,255,.04);}
.cat-tab:hover{color:var(--txt);border-color:var(--primary);}
.cat-tab.on{background:var(--grad);color:#fff;border-color:transparent;}

/* HOW IT WORKS */
.how-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;}
.how-card{background:var(--card);border:1px solid var(--bord);border-radius:14px;padding:1.5rem;text-align:center;transition:all .25s;}
.how-card:hover{border-color:rgba(59,130,246,.22);transform:translateY(-3px);}
.how-n{font-family:'Montserrat';font-size:2rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:.45rem;}
.how-icon{font-size:1.6rem;margin-bottom:.5rem;}
.how-t{font-family:'Montserrat';font-size:.86rem;font-weight:700;margin-bottom:.3rem;}
.how-d{color:var(--mut2);font-size:.76rem;line-height:1.55;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:5rem 1rem 2rem;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.07) 0%,transparent 60%),var(--bg);}
.auth-box{width:410px;max-width:94vw;background:var(--card);border:1px solid var(--bord);
  border-radius:16px;padding:2.1rem;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.auth-logo{display:flex;align-items:center;gap:.4rem;justify-content:center;font-family:'Montserrat';font-size:1.15rem;font-weight:800;margin-bottom:.25rem;}
.auth-tag{color:var(--mut2);text-align:center;font-size:.8rem;margin-bottom:1.4rem;}
.auth-box h2{font-family:'Montserrat';font-size:1.25rem;font-weight:800;text-align:center;margin-bottom:1.3rem;}
.fg{display:flex;flex-direction:column;gap:.26rem;margin-bottom:.75rem;}
.fg label{font-size:.7rem;font-weight:600;color:var(--mut2);letter-spacing:.3px;}
.fg input,.fg select,.fg textarea{background:rgba(255,255,255,.04);border:1.5px solid var(--bord);
  color:var(--txt);padding:.6rem .85rem;border-radius:8px;font-family:'Inter';font-size:.86rem;outline:none;width:100%;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:rgba(59,130,246,.45);background:rgba(255,255,255,.06);}
.fg input::placeholder{color:rgba(255,255,255,.2);}
.fg textarea{resize:vertical;min-height:75px;}
.pw-wrap{position:relative;}.pw-wrap input{padding-right:2.6rem;}
.pw-eye{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--mut2);cursor:pointer;font-size:.82rem;}
.divid{display:flex;align-items:center;gap:.65rem;margin:.75rem 0;color:var(--mut);font-size:.7rem;}
.divid::before,.divid::after{content:'';flex:1;height:1px;background:var(--bord);}
.auth-sw{text-align:center;color:var(--mut2);font-size:.8rem;margin-top:.85rem;}
.auth-sw a{color:var(--primary2);cursor:pointer;font-weight:600;}

/* DASHBOARD */
.dash-layout{display:flex;min-height:100vh;padding-top:60px;}
.dash-sb{width:210px;background:var(--bg2);border-right:1px solid var(--bord);
  padding:1.2rem 0;position:fixed;top:60px;left:0;bottom:0;overflow-y:auto;}
.sb-sec{padding:.28rem 1.2rem;font-size:.57rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:.65rem;font-weight:700;}
.sb-i{display:flex;align-items:center;gap:.55rem;padding:.65rem 1.2rem;cursor:pointer;
  color:var(--mut2);font-size:.83rem;font-weight:500;transition:all .18s;border-left:2px solid transparent;}
.sb-i:hover,.sb-i.on{color:var(--txt);background:rgba(255,255,255,.04);border-left-color:var(--primary);}
.sb-i .ic{width:16px;text-align:center;font-size:.85rem;}
.sb-div{height:1px;background:var(--bord);margin:.4rem 0;}
.dash-main{margin-left:210px;flex:1;padding:1.8rem;background:var(--bg);}
.dash-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.4rem;flex-wrap:wrap;gap:.85rem;}
.dash-hd h1{font-family:'Montserrat';font-size:1.35rem;font-weight:800;}
.dash-hd p{color:var(--mut2);font-size:.8rem;margin-top:.1rem;}

/* KPIS */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.9rem;margin-bottom:1.4rem;}
.kpi{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1rem;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--grad);}
.kpi-l{font-size:.61rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut2);margin-bottom:.3rem;}
.kpi-v{font-family:'Montserrat';font-size:1.55rem;font-weight:800;}
.kpi-s{font-size:.68rem;color:var(--mut2);margin-top:.1rem;}

/* PANELS */
.panel{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.1rem;}
.panel-t{font-family:'Montserrat';font-size:.65rem;font-weight:700;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--mut2);border-bottom:1px solid var(--bord);padding-bottom:.6rem;margin-bottom:.85rem;}
.dgrid{display:grid;grid-template-columns:2fr 1fr;gap:1rem;}

/* VIRTUAL ACCOUNT CARD */
.vacct-card{background:linear-gradient(135deg,#0f2040,#1a3060);
  border:1px solid rgba(59,130,246,.25);border-radius:16px;
  padding:1.6rem;margin-bottom:1.1rem;position:relative;overflow:hidden;}
.vacct-card::before{content:'';position:absolute;top:-40px;right:-40px;
  width:150px;height:150px;border-radius:50%;background:rgba(59,130,246,.08);}
.vacct-card::after{content:'';position:absolute;bottom:-30px;left:-30px;
  width:100px;height:100px;border-radius:50%;background:rgba(139,92,246,.06);}
.vacct-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem;position:relative;z-index:1;}
.vacct-label{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);font-weight:600;margin-bottom:.18rem;}
.vacct-bank{font-size:.78rem;color:var(--primary2);font-weight:600;}
.vacct-logo{font-size:1.6rem;}
.vacct-num{font-family:'Montserrat';font-size:1.85rem;font-weight:900;letter-spacing:2px;
  background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:.25rem;position:relative;z-index:1;}
.vacct-name{font-size:.78rem;color:var(--mut2);font-weight:500;position:relative;z-index:1;}
.vacct-bal{position:relative;z-index:1;margin-top:1rem;padding-top:1rem;
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;justify-content:space-between;align-items:center;}
.vacct-bal-l{font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2);font-weight:600;}
.vacct-bal-v{font-family:'Montserrat';font-size:1.4rem;font-weight:800;color:var(--green);}
.vacct-actions{display:flex;gap:.55rem;margin-top:.9rem;position:relative;z-index:1;}
.vacct-btn{flex:1;padding:.55rem;border-radius:8px;font-family:'Montserrat';font-weight:700;
  font-size:.74rem;cursor:pointer;transition:all .2s;border:none;display:flex;align-items:center;justify-content:center;gap:.3rem;}
.vacct-btn.copy{background:rgba(255,255,255,.08);color:var(--txt);border:1px solid var(--bord2);}
.vacct-btn.copy:hover{background:rgba(255,255,255,.14);}
.vacct-btn.ref{background:var(--grad);color:#fff;}
.vacct-btn.ref:hover{opacity:.88;}

/* TRANSACTIONS */
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:.62rem 0;border-bottom:1px solid var(--bord);}
.tx-row:last-child{border-bottom:none;}
.tx-l{display:flex;align-items:center;gap:.5rem;}
.tx-ico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;}
.tx-desc{font-weight:500;font-size:.81rem;}
.tx-date{font-size:.68rem;color:var(--mut2);}
.tx-a{font-family:'Montserrat';font-weight:700;}
.tx-a.pos{color:var(--green);}
.tx-a.neg{color:var(--primary2);}

/* ADMIN */
.asec{display:none;}.asec.on{display:block;}
.tbl-wrap{background:var(--card);border:1px solid var(--bord);border-radius:12px;overflow:hidden;overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;font-size:.8rem;min-width:520px;}
.tbl th{text-align:left;padding:.6rem .85rem;background:rgba(255,255,255,.03);color:var(--mut2);font-size:.59rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--bord);}
.tbl td{padding:.72rem .85rem;border-bottom:1px solid var(--bord);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.02);}
.tag{padding:.14rem .48rem;border-radius:50px;font-size:.62rem;font-weight:700;}
.t-g{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.t-y{background:rgba(245,158,11,.1);color:var(--gold);border:1px solid rgba(245,158,11,.2);}
.t-r{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.18);}
.t-b{background:rgba(59,130,246,.1);color:var(--primary2);border:1px solid rgba(59,130,246,.2);}
.t-gr{background:rgba(255,255,255,.05);color:var(--mut2);border:1px solid var(--bord);}
.akpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:.9rem;margin-bottom:1.3rem;}
.ak{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:.95rem;}
.ak-l{color:var(--mut2);font-size:.59rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:.28rem;font-weight:700;}
.ak-v{font-family:'Montserrat';font-size:1.5rem;font-weight:800;}
.abs{display:flex;gap:.28rem;flex-wrap:wrap;}

/* CHECKOUT */
.co-wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem;padding-top:calc(60px + 1.8rem);}
.co-grid{display:grid;grid-template-columns:1fr 270px;gap:1.3rem;}
.co-title{font-family:'Montserrat';font-size:1.3rem;font-weight:800;margin-bottom:1.3rem;grid-column:1/-1;}
.csum{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.2rem;height:fit-content;position:sticky;top:74px;}
.csum-t{font-size:.64rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut2);margin-bottom:.85rem;}
.csum-row{display:flex;justify-content:space-between;padding:.35rem 0;font-size:.82rem;color:var(--mut2);}
.csum-tot{display:flex;justify-content:space-between;border-top:1px solid var(--bord);margin-top:.45rem;padding-top:.7rem;font-family:'Montserrat';font-weight:800;font-size:.94rem;}
.wbb{background:linear-gradient(135deg,rgba(34,197,94,.06),rgba(34,197,94,.03));border:1px solid rgba(34,197,94,.16);border-radius:10px;padding:.85rem;margin-bottom:.9rem;}
.wbb-l{font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut2);margin-bottom:.15rem;}
.wbb-v{font-family:'Montserrat';font-size:1.15rem;font-weight:800;color:var(--green);}

/* DELIVERED */
.deliv-wrap{max-width:520px;margin:0 auto;padding:4rem 1.5rem;padding-top:calc(60px + 3rem);text-align:center;}
.deliv-icon{font-size:3.5rem;margin-bottom:.85rem;animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.deliv-t{font-family:'Montserrat';font-size:1.6rem;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem;}
.cred-box{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:1.2rem;text-align:left;margin-bottom:1rem;}
.cred-bt{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut2);margin-bottom:.8rem;}
.cred-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--bord);}
.cred-row:last-child{border-bottom:none;}
.cred-k{color:var(--mut2);font-size:.78rem;}
.cred-v{font-family:monospace;font-size:.78rem;color:var(--primary2);word-break:break-all;max-width:62%;}
.copy-btn{background:rgba(255,255,255,.05);border:1px solid var(--bord);color:var(--mut2);padding:.14rem .45rem;border-radius:5px;font-size:.62rem;cursor:pointer;transition:all .15s;}
.copy-btn:hover{color:var(--txt);border-color:var(--primary);}

/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;
  justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px);}
.mo.open{opacity:1;pointer-events:all;}
.mo-box{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:1.9rem;
  max-width:380px;width:92%;text-align:center;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}
.mo.open .mo-box{transform:scale(1);}
.mo-icon{font-size:2.3rem;margin-bottom:.7rem;}
.mo-box h2{font-family:'Montserrat';font-size:1.2rem;font-weight:800;margin-bottom:.35rem;}
.mo-box p{color:var(--mut2);font-size:.82rem;line-height:1.6;margin-bottom:1.1rem;}
.mo-box2{background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:1.5rem;
  max-width:340px;width:92%;transform:scale(.92);transition:transform .22s;box-shadow:0 32px 80px rgba(0,0,0,.8);}

  transform:translateY(100px);opacity:0;transition:all .3s;max-width:260px;font-size:.8rem;box-shadow:0 8px 32px rgba(0,0,0,.6);}

/* BACK FAB */
.back-fab{position:fixed;bottom:1.3rem;left:1.3rem;z-index:8000;background:var(--card);

/* MOBILE NAV */
.mobnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);

.spin{width:28px;height:28px;border:3px solid var(--bord);border-top-color:var(--primary);
